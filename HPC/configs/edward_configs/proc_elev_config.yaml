# Chan3ProcAll_cssl and ElevCorr_cssl Configuration File
# ================================

# ====
# Chan3ProcAll_cssl Configuration
# ====

# Input/output directories
infolder: /data/raw
savefolder: data/processednew

# Date Range Endpoints (Format: YYYYMMDDHHmmss)
# Comment these out or leave them blank to process all files
start_time: 20260102000000 
end_time: 20260109000000

# Filename pattern (for UHFLHCP_CH3_YYYYMMDDHHmmss_ch0/_ch1 format)
prefix: UHFLHCP_CH3_
suffix0: _ch0.dat
suffix1: _ch1.dat

# Processing parameters
Ti: 0.9  #integration time - would change with llm / uum
num: 2
sample_rate: 20e6
llm: 8997500       # Uncomment to trim lag range
uum: 9002500

# Signal processing
window: hanning       # Options: none, hanning, hamming, blackman, blackmanharris, kaiser4
zero_pad_factor: 1    # 1 = no padding, 2 = 2x zero-pad, etc.
peak_lag: 0.575     # Fixed fractional lag to extract amplitude/phase at

# Performance
fft_workers: -1       # -1 = all CPU cores

# Logging
verbose: false
# log: processing.log  # Uncomment to log to file

# Output
summary_csv: true     # Write summary CSV
time_series_plot: true # Generate time-series plot
save_plots: false      # Save correlation plot per file pair (to <savefolder>/plots/)
rerun: true           # Reprocess files even if output already exists

# ====
# ElevCorr_cssl Configuration
# ====

# Input/output directories
input_csv: "/global/scratch/users/mgirotto/Pband_data/PostProcess/Storm_Early_Jan/*.csv"
output_csv: "/global/scratch/users/mgirotto/Pband_data/PostProcess/Storm_Early_Jan/elev_corrected.csv"

# Location-specific params
norad_id: 38093 # MUOS-1 Satellite
station_lat: 39.3255976 # CSSL Tower
station_lon: -120.3678802 # CSSL Tower
tower_height_m: 6.096 # CSSL Tower
wavelength_m: 0.769 # ~390 MHz, P-band Carrier